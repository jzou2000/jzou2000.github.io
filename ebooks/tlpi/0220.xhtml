 <div class="htmlcontent"><h3 class="docSection1Title" id="-100000">2.20. Summary</h3><p class="docText">In
 this chapter, we surveyed a range of fundamental concepts related to 
Linux system programming. An understanding of these concepts should 
provide readers with limited experience on Linux or UNIX with enough 
background to begin learning system programming.</p>
