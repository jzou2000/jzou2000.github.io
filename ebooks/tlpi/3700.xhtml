 <div class="htmlcontent"><h2 class="docChapterTitle" id="title-ID0EAHGK">Chapter 37. Daemons</h2><p class="docText">This
 chapter examines the characteristics of daemon processes and looks at 
the steps required to turn a process into a daemon. We also look at how 
to log messages from a daemon using the <span class="docEmphasis">syslog</span> facility.</p>
