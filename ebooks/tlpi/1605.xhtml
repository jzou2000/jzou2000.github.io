 <div class="htmlcontent"><h3 class="docSection1Title" id="-100000">16.5. Exercise</h3><div style="font-weight:bold"><ol class="docList" type="1"><li><div style="font-weight:normal"><p class="docList">Write a program that can be used to create or modify a <span class="docEmphasis">user</span> EA for a file (i.e., a simple version of <span class="docEmphasis">setfattr(1)</span>). The filename and the EA name and value should be supplied as command-line arguments to the program.</p></div></li></ol></div>
