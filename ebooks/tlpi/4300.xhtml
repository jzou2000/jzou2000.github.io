 <div class="htmlcontent"><h2 class="docChapterTitle" id="title-ID0EGKAM">Chapter 43. Interprocess Communication Overview</h2><p class="docText">This
 chapter presents a brief overview of the facilities that processes and 
threads can use to communicate with one another and to synchronize their
 actions. The following chapters provide more details about these 
facilities.</p>
