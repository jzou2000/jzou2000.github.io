 <div class="htmlcontent"><h3 class="docSection1Title" id="-100000">37.7. Exercise</h3><div style="font-weight:bold"><ol class="docList" type="1"><li><div style="font-weight:normal"><p class="docList">Write a program (similar to <span class="docEmphasis">logger(1)</span>) that uses <span class="docEmphasis">syslog(3)</span>
 to write arbitrary messages to the system log file. As well as 
accepting a single command-line argument containing the message to be 
logged, the program should permit an option to specify the <span class="docEmphasis">level</span> of the message.</p></div></li></ol></div>
