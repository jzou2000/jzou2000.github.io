 <div class="htmlcontent"><h2 class="docChapterTitle" id="title-ID0EATCI">Chapter 16. Extended Attributes</h2><p class="docText">This
 chapter describes extended attributes (EAs), which allow arbitrary 
metadata, in the form of name-value pairs, to be associated with file 
i-nodes. EAs were added to Linux in version 2.6.</p>
