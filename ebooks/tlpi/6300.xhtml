 <div class="htmlcontent"><h2 class="docChapterTitle" id="title-ID0E2BIM">Chapter 63. Alternative I/O Models</h2><p class="docText">This
 chapter discusses three alternatives to the conventional file I/O model
 that we have employed in most programs shown in this book:</p><ul><li><p class="docList">I/O multiplexing (the <span class="docEmphasis">select()</span> and <span class="docEmphasis">poll()</span> system calls);</p></li><li><p class="docList">signal-driven I/O; and</p></li><li><p class="docList">the Linux-specific <span class="docEmphasis">epoll</span> API.</p></li></ul>
</div>
