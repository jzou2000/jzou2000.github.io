 <div class="htmlcontent"><h2 class="docChapterTitle" id="title-ID0EJYCM">Chapter 49. Memory Mappings</h2><p class="docText">This chapter discusses the use of the <span class="docEmphasis">mmap()</span>
 system call to create memory mappings. Memory mappings can be used for 
IPC, as well as a range of other purposes. We begin with an overview of 
some fundamental concepts before considering <span class="docEmphasis">mmap()</span> in depth.</p>
