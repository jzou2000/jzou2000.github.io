 <div class="htmlcontent"><h3 class="docSection1Title" id="-100000">3.8. Exercise</h3><div style="font-weight:bold"><ol class="docList" type="1"><li><div style="font-weight:normal"><p class="docList">When using the Linux-specific <span class="docEmphasis">reboot()</span> system call to reboot the system, the second argument, <span class="docEmphasis">magic2</span>, must be specified as one of a set of magic numbers (e.g., <tt>LINUX_REBOOT_MAGIC2</tt>). What is the significance of these numbers? (Converting them to hexadecimal provides a clue.)</p></div></li></ol></div>
