 <div class="htmlcontent"><h3 class="docSection1Title" id="-100000">19.7. Summary</h3><p class="docText">The Linux-specific <span class="docEmphasis">inotify</span>
 mechanism allows an application to obtain notifications when events 
(files are opened, closed, created, deleted, modified, renamed, and so 
on) occur for a set of monitored files and directories. The <span class="docEmphasis">inotify</span> mechanism supersedes the older <span class="docEmphasis">dnotify</span> mechanism.</p>
