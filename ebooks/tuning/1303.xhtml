<h3 class="docSection1Title" id="-100000">Summary</h3>
<p class="docText">kgdb and kdb are powerful 
tools for performing kernel debugging. kgdb requires two machines to 
debug the kernel. It also allows source-level-type debugging, similar to
 debugging an application with gdb. kdb requires only one machine, but 
it can’t do source-code-level debugging.</p>
