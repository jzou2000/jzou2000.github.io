 <div class="htmlcontent"><h2 class="docAppendixTitle" id="title-ID0EALBM">B. C++ Reserved Words</h2>
<p class="docText">C++
 reserves some words for its own use and for use in C++ libraries. You 
shouldn’t use a reserved word as an identifier in a declaration. 
Reserved words come in three categories: keywords, alternative tokens, 
and C++ library reserved names.</p>
