                <h1>Transitioning between elements</h1>
            </header>

            <article>
                
<p>Everything on a web page is an element. You can easily make them appear and disappear, thanks to Vue <kbd><span class="epub__VerbatimChar">v-if</span></kbd> and <kbd><span class="epub__VerbatimChar">v-show</span></kbd> directives. With transitions, you can easily control how they appear and even add magic effects. This recipe explains how to do it.</p>


            </article>
