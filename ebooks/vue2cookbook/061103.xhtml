<p>When the root route is matched, the <kbd>Home</kbd> component won't be loaded. The path of <kbd><span class="epub__VerbatimChar">/last-year-sales</span></kbd> will be matched instead. We can also omit the component altogether since it will never be loaded:</p>
<pre>{ path: '/', redirect: '/last-year-sales' }
</pre>
