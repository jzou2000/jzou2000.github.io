<p>Running the preceding code will install an event handler on the button. The syntax is <kbd><span class="epub__VerbatimChar">v-on:DOMevent="methodEventHandler"</span></kbd>. The handler must be a method, that is, a function in the <span class="epub__VerbatimChar">methods</span> option. In the preceding example, <kbd><span class="epub__VerbatimChar">toast</span></kbd> is the handler.</p>
