<p>Here we just inserts three radio buttons. Since they all have <kbd><span class="epub__VerbatimChar">v-model="gender"</span></kbd>, they logically belong to the same group. This means that only one of the values can be selected at any given time. We can have as many groups as we want in the same form.</p>
