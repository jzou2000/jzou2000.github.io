 <section>

                <h1>Named redirecting</h1>
            </header>

            <article>
                
<p>Redirection can be combined with named routes (refer to the <em>Using named dynamic routes</em> recipe). We can specify the destination by name:</p>
<pre>...<br/>{ path: '/clothes', name: 'listing', component: Clothes },<br/>{ path: '/shoes', redirect: { name: 'listing' }}
</pre>


            </article>
