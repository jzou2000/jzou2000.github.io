<body>
 <section>

            <header>
                <h1>Redirecting to 404s</h1>
            </header>

            <article>
                
<p>Redirecting not found pages is done by adding a catch-all as the last route. It will match everything that is not matched by the other routes:</p>
<pre>...<br/>{ path: '/404', component: NotFound },<br/>{ path: '*', redirect: '/404' }
</pre>


            </article>

            <footer style="margin-top: 5em;">
                
            </footer>

        </section>


</body>
