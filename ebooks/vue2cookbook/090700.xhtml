 <section>

            <header>
                <h1>Using JSX to render a component</h1>
            </header>

            <article>
                
<p>JSX is very popular in the React community. In Vue, you don't have to use JSX to build templates for your components; you can use the much more familiar HTML. JSX, however, is the next best thing you can do if you are forced to write a lot of render functions.</p>
