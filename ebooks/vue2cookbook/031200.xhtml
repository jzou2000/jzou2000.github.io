                <h1>Dynamic transitions</h1>

            <article>
                
<p>In Vue, a constant theme is reactivity and, of course, transitions can be dynamic because of that. Not only the transition themselves, but all their properties can be bound to reactive variables. This gives us a lot of control on which transition to use at any given moment.</p>
