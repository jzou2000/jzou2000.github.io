 <div class="htmlcontent"><h3 class="docSection1Title" id="-100000">Introduction</h3>
<p class="docText">This chapter describes a few facets of C++ that
don't neatly fit into any of the other chapters:
function and member pointers, <tt>const</tt> variables and
member functions, and standalone (i.e., nonmember) operators and a
few other topics.</p>
